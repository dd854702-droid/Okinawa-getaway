<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>沖繩冒險日誌 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        :root {
            --bg-main: #0f172a;
            --accent: #06b6d4;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-main);
            color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-content {
            display: none;
            animation: slideUp 0.4s ease-out forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes slideUp {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .gradient-border {
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        input, select, textarea {
            background-color: #020617 !important;
        }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-[#0f172a]/80 backdrop-blur-md border-b border-cyan-500/20 px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent italic tracking-tight">
                OKINAWA ADVENTURE
            </h1>
            <p class="text-[10px] text-cyan-300/60 uppercase tracking-widest font-mono">2026.05.20 - 05.25</p>
        </div>
        <div class="bg-cyan-900/40 p-2 rounded-full border border-cyan-400/30 text-cyan-400">
            <i data-lucide="waves"></i>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <!-- Tab: Quest (行程) -->
        <section id="quest-tab" class="tab-content active space-y-6">
            <div class="flex overflow-x-auto gap-2 pb-2 no-scrollbar" id="day-selector">
                <!-- Days will be generated by JS -->
            </div>

            <div class="bg-slate-900/50 rounded-2xl p-5 border border-slate-800">
                <h2 class="text-lg font-bold mb-5 text-cyan-100 flex items-center gap-2" id="current-day-title">
                    <i data-lucide="calendar" class="w-5 h-5 text-cyan-400"></i>
                    載入中...
                </h2>
                <div class="space-y-4" id="quest-list">
                    <!-- Quests will be generated by JS -->
                </div>
            </div>
        </section>

        <!-- Tab: Inventory (記帳) -->
        <section id="inventory-tab" class="tab-content space-y-6">
            <!-- 預算卡片 -->
            <div class="bg-gradient-to-br from-[#1e293b] to-[#0f172a] rounded-2xl p-6 border border-cyan-500/30 shadow-lg">
                <div class="text-xs text-cyan-400/80 mb-1 font-bold uppercase tracking-widest text-[10px]">Magic Funds</div>
                <div class="text-3xl font-mono font-bold text-white mb-2" id="balance-display">￥ 100,000</div>
                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                    <div id="balance-bar" class="bg-cyan-400 h-full transition-all duration-500" style="width: 100%"></div>
                </div>
                <div class="flex justify-between mt-2 text-[10px] text-slate-500">
                    <span id="spent-display">已使用: 0</span>
                    <span>總魔力: 100,000</span>
                </div>
            </div>

            <!-- 輸入框 -->
            <div class="bg-slate-900 rounded-2xl p-4 border border-slate-800 space-y-3 shadow-inner">
                <div class="grid grid-cols-2 gap-2">
                    <input id="exp-title" class="border border-slate-800 rounded-xl px-3 py-2 text-sm text-white outline-none focus:border-cyan-500" placeholder="消費項目">
                    <input id="exp-amount" type="number" class="border border-slate-800 rounded-xl px-3 py-2 text-sm text-white outline-none focus:border-cyan-500" placeholder="金額 ￥">
                </div>
                <div class="flex gap-2">
                    <select id="exp-category" class="border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-400 outline-none flex-1">
                        <option value="food">伙食消耗</option>
                        <option value="transport">傳送代價 (交通)</option>
                        <option value="shop">戰利品 (購物)</option>
                        <option value="other">其他雜項</option>
                    </select>
                    <button onclick="addExpense()" class="bg-cyan-500 text-white px-4 py-2 rounded-xl flex items-center gap-1 font-bold text-sm shadow-lg shadow-cyan-500/20 active:scale-95">
                        <i data-lucide="plus" class="w-4 h-4"></i> 記錄
                    </button>
                </div>
            </div>

            <!-- 列表 -->
            <div class="space-y-3">
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2">Recent Records</h3>
                <div id="expense-list" class="space-y-2">
                    <!-- Expenses will be generated here -->
                </div>
            </div>
        </section>

        <!-- Tab: Info (資訊) -->
        <section id="info-tab" class="tab-content space-y-4">
            <div class="bg-slate-900 rounded-2xl p-6 border border-slate-800">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-cyan-400">
                    <i data-lucide="info" class="w-5 h-5"></i> 探險提醒
                </h2>
                <div class="space-y-3 text-sm text-slate-400 leading-relaxed">
                    <p class="flex gap-2"><span class="text-cyan-500">•</span> 飯店為 HOTEL StoRK 那覇新都心，靠近牧志站。</p>
                    <p class="flex gap-2"><span class="text-cyan-500">•</span> 沖繩 5 月底氣候炎熱且偶有陣雨，建議攜帶雨具。</p>
                    <p class="flex gap-2"><span class="text-cyan-500">•</span> 燒肉與熱門餐廳建議提早排隊或預約。</p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex flex-col items-center">
                    <i data-lucide="trending-down" class="text-cyan-400 mb-2"></i>
                    <span class="text-[10px] text-slate-500">目前匯率 (預估)</span>
                    <span class="font-bold text-sm">0.21 TWD/JPY</span>
                </div>
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex flex-col items-center">
                    <i data-lucide="clock" class="text-cyan-400 mb-2"></i>
                    <span class="text-[10px] text-slate-500">當地時間</span>
                    <span class="font-bold text-sm">UTC+9</span>
                </div>
            </div>

            <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 px-1">冒險筆記</h3>
                <textarea class="w-full border border-slate-800 rounded-xl p-3 text-sm text-white focus:border-cyan-500 outline-none h-32 transition-colors resize-none" placeholder="紀錄旅行中的小驚喜..."></textarea>
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f172a]/95 backdrop-blur-xl border-t border-slate-800 px-4 pb-8 pt-3 flex justify-around items-center z-50">
        <button onclick="switchTab('quest')" id="nav-quest" class="nav-item flex flex-col items-center gap-1 flex-1 text-cyan-400">
            <i data-lucide="scroll" class="w-5 h-5"></i>
            <span class="text-[10px] font-bold">任務</span>
        </button>
        <button onclick="switchTab('inventory')" id="nav-inventory" class="nav-item flex flex-col items-center gap-1 flex-1 text-slate-600">
            <i data-lucide="wallet" class="w-5 h-5"></i>
            <span class="text-[10px] font-bold">行囊</span>
        </button>
        <button onclick="switchTab('info')" id="nav-info" class="nav-item flex flex-col items-center gap-1 flex-1 text-slate-600">
            <i data-lucide="info" class="w-5 h-5"></i>
            <span class="text-[10px] font-bold">資訊</span>
        </button>
    </nav>

    <script>
        // --- 數據結構 ---
        const itinerary = [
            {
                date: '05/20',
                title: 'Day 1: 抵達與首里之夜',
                quests: [
                    { time: '14:50', location: '桃園機場', task: '起飛 MM924', type: 'transport' },
                    { time: '17:35', location: '那霸機場', task: '抵達與出關', type: 'transport' },
                    { time: '18:40', location: 'HOTEL StoRK', task: '飯店 Check-in', type: 'save' },
                    { time: '19:30', location: '安安 牧志駅前店', task: '晚餐: 七輪焼肉', type: 'food' },
                    { time: '20:45', location: 'MaxValu 牧志店', task: '超市採買補給', type: 'shop' }
                ]
            },
            {
                date: '05/21',
                title: 'Day 2: 首里城與國際通',
                quests: [
                    { time: '09:30', location: '西來院', task: '參拜祈福', type: 'sight' },
                    { time: '10:00', location: 'rokkan COFFEE', task: '早午餐咖啡', type: 'food' },
                    { time: '11:00', location: '首里城', task: '歷史古蹟參觀', type: 'sight' },
                    { time: '13:00', location: 'STAND EIBUN', task: '午餐: 沖繩麵', type: 'food' },
                    { time: '14:30', location: '世豊商店', task: '逛街採買', type: 'shop' },
                    { time: '17:00', location: '暖暮 那覇開南店', task: '晚餐: 烈火拉麵', type: 'food' }
                ]
            },
            {
                date: '05/22',
                title: 'Day 3: 水族館與 Outlet',
                quests: [
                    { time: '08:30', location: '甘味処 万丸', task: '日式早餐', type: 'food' },
                    { time: '10:00', location: 'DMM 水族館', task: '數位水族館體驗', type: 'sight' },
                    { time: '12:00', location: 'iias 沖繩豐崎', task: '午餐 + 賣場採買', type: 'shop' },
                    { time: '14:00', location: 'ASHIBINAA Outlet', task: '逛街掃貨', type: 'shop' },
                    { time: '18:00', location: '康竜 那覇松山店', task: '晚餐: 康竜拉麵', type: 'food' }
                ]
            },
            {
                date: '05/23',
                title: 'Day 4: 浦添購物之旅',
                quests: [
                    { time: '09:10', location: '麥當勞 天久店', task: '在地早餐', type: 'food' },
                    { time: '10:30', location: 'PARCO CITY', task: '大型商場購物', type: 'shop' },
                    { time: '17:30', location: '小やじ 那覇店', task: '晚餐: 沖繩炸豬排', type: 'food' },
                    { time: '18:30', location: ' 唐吉訶德', task: '國際通最後採買', type: 'shop' }
                ]
            },
            {
                date: '05/24',
                title: 'Day 5: 牧志市場深度遊',
                quests: [
                    { time: '09:30', location: '福助の玉子焼き', task: '特色玉子燒早餐', type: 'food' },
                    { time: '10:00', location: '市場本通り', task: '在地商店街逛街', type: 'shop' },
                    { time: '12:00', location: '牧志公設市場', task: '午餐: 市場海鮮', type: 'food' },
                    { time: '13:00', location: '國際通商店街', task: '午後散策購物', type: 'shop' },
                    { time: '17:30', location: '焼肉すだく', task: '晚餐: 近江牛燒肉', type: 'food' }
                ]
            },
            {
                date: '05/25',
                title: 'Day 6: 返程歸途',
                quests: [
                    { time: '07:30', location: '飯店出發', task: '前往那霸機場', type: 'transport' },
                    { time: '10:10', location: '起飛 IT231', task: '返航桃園機場', type: 'transport' }
                ]
            }
        ];

        let currentDayIdx = 0;
        let budget = 100000;
        let expenses = JSON.parse(localStorage.getItem('ok_expenses')) || [
            { id: 1, title: '安安燒肉晚餐', amount: 4500, category: 'food', date: '05/20' }
        ];

        // --- 初始化 ---
        function init() {
            lucide.createIcons();
            renderDaySelector();
            renderQuests();
            renderExpenses();
        }

        // --- 分頁切換 ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('text-cyan-400'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.add('text-slate-600'));

            document.getElementById(tabId + '-tab').classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('text-cyan-400');
            document.getElementById('nav-' + tabId).classList.remove('text-slate-600');
            
            window.scrollTo(0, 0);
        }

        // --- 行程渲染 ---
        function renderDaySelector() {
            const container = document.getElementById('day-selector');
            container.innerHTML = itinerary.map((day, idx) => `
                <button onclick="selectDay(${idx})" class="flex-shrink-0 px-4 py-2 rounded-xl border transition-all ${currentDayIdx === idx ? 'bg-cyan-500 border-cyan-400 text-white shadow-lg' : 'bg-slate-900 border-slate-800 text-slate-400'}">
                    <div class="text-[10px] opacity-80">${day.date}</div>
                    <div class="font-bold">DAY ${idx + 1}</div>
                </button>
            `).join('');
        }

        function selectDay(idx) {
            currentDayIdx = idx;
            renderDaySelector();
            renderQuests();
        }

        function renderQuests() {
            const day = itinerary[currentDayIdx];
            document.getElementById('current-day-title').innerHTML = `<i data-lucide="calendar" class="w-5 h-5 text-cyan-400"></i> ${day.title}`;
            
            const list = document.getElementById('quest-list');
            list.innerHTML = day.quests.map(q => `
                <div class="relative pl-6 border-l-2 border-slate-800">
                    <div class="absolute left-[-5px] top-1 w-2 h-2 rounded-full bg-cyan-500 shadow-[0_0_8px_rgba(6,182,212,0.6)]"></div>
                    <div class="bg-slate-800/40 p-3 rounded-xl border border-slate-700/50 flex justify-between items-start">
                        <div class="space-y-1">
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-mono text-cyan-400">${q.time}</span>
                                <span class="text-[10px] text-slate-500 opacity-70">|</span>
                                <span class="text-[10px] uppercase font-bold text-slate-400">${q.type}</span>
                            </div>
                            <h3 class="font-bold text-sm text-slate-100">${q.task}</h3>
                            <div class="flex items-center gap-1 text-[11px] text-slate-500">
                                <i data-lucide="map-pin" class="w-3 h-3"></i> ${q.location}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- 記帳功能 ---
        function renderExpenses() {
            const totalSpent = expenses.reduce((sum, e) => sum + e.amount, 0);
            const balance = budget - totalSpent;
            const percent = Math.max(0, (balance / budget) * 100);

            document.getElementById('balance-display').innerText = `￥ ${balance.toLocaleString()}`;
            document.getElementById('spent-display').innerText = `已使用: ${totalSpent.toLocaleString()}`;
            document.getElementById('balance-bar').style.width = percent + '%';

            const list = document.getElementById('expense-list');
            list.innerHTML = expenses.map(e => {
                let icon = 'shopping-bag';
                if(e.category === 'food') icon = 'utensils';
                if(e.category === 'transport') icon = 'car';

                return `
                <div class="bg-slate-900/40 p-4 rounded-2xl border border-slate-800 flex justify-between items-center group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-cyan-400">
                            <i data-lucide="${icon}" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <div class="font-bold text-sm text-slate-100">${e.title}</div>
                            <div class="text-[10px] text-slate-500">${e.date}</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-sm font-mono font-bold text-cyan-100">￥${e.amount.toLocaleString()}</div>
                        <button onclick="deleteExpense(${e.id})" class="text-slate-700 hover:text-red-400">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
            localStorage.setItem('ok_expenses', JSON.stringify(expenses));
        }

        function addExpense() {
            const title = document.getElementById('exp-title').value;
            const amount = parseInt(document.getElementById('exp-amount').value);
            const category = document.getElementById('exp-category').value;

            if(!title || isNaN(amount)) return;

            expenses.unshift({
                id: Date.now(),
                title,
                amount,
                category,
                date: itinerary[currentDayIdx].date
            });

            document.getElementById('exp-title').value = '';
            document.getElementById('exp-amount').value = '';
            renderExpenses();
        }

        function deleteExpense(id) {
            expenses = expenses.filter(e => e.id !== id);
            renderExpenses();
        }

        window.onload = init;
    </script>
</body>
</html>
